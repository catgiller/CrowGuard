<html><head><meta charset="UTF-8"><style>
body{background:#f5f0eb;display:flex;gap:2rem;padding:2rem;align-items:flex-start;font-family:sans-serif;}
.box{text-align:center;} .box p{margin-top:.5rem;font-size:.75rem;color:#666;}

<div class="box"><div style="width:200px;height:200px"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f89957"/>
      <stop offset="35%" stop-color="#f17628"/>
      <stop offset="60%" stop-color="#d5332a"/>
      <stop offset="82%" stop-color="#d260a5"/>
      <stop offset="100%" stop-color="#a21f65"/>
    </linearGradient>
  </defs>

  <!-- Gradient filled shield -->
  <path d="M60 7 L107 22 L107 63 C107 86 87 102 60 112 C33 102 13 86 13 63 L13 22 Z" fill="url(#g)"/>

  <!-- Dark crow silhouette on gradient background -->
  <g fill="#1c0822">
    <!-- Head (oval, side profile) -->
    <ellipse cx="44" cy="50" rx="12" ry="11"/>

    <!-- Beak (wide, prominent triangle) -->
    <polygon points="33,46 10,53 33,59"/>

    <!-- Wing (dominant — large D-curve above body) -->
    <path d="M 54 56 C 62 44 78 34 94 29 C 107 25 112 34 107 41 C 98 43 85 49 74 57 C 65 63 57 70 54 73 Z"/>

    <!-- Body (large, teardrop) -->
    <path d="M 46 58 C 48 54 54 52 62 52 C 76 52 90 62 93 76 C 95 86 90 96 81 99 C 71 102 60 98 52 90 C 44 82 43 72 46 62 Z"/>

    <!-- Tail feathers -->
    <path d="M 79 97 L 71 110 L 79 99 L 84 112 L 89 99 L 97 110 L 89 97 Z"/>
  </g>

  <!-- Eye (shows gradient behind) -->
  <circle cx="42" cy="47" r="3.5" fill="url(#g)"/>
  <circle cx="41" cy="46" r="1.5" fill="#fff" opacity="0.6"/>
</svg></div><p>200×200</p></div>
