<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — CrowGuard AI</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh; display: flex; align-items: center; justify-content: center;
  background: #100c14; position: relative; overflow: hidden;
  font-family: var(--ff-b);
}

/* ── Background orbs ── */
.orb {
  position: fixed; border-radius: 50%; pointer-events: none;
  filter: blur(90px); opacity: 0.16; animation: float 8s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-20px) scale(1.04)} }

/* ── Top bar ── */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem clamp(1.25rem, 4vw, 3rem);
}
.back-link {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.8125rem; font-weight: 600; color: rgba(255,255,255,0.4);
  text-decoration: none; transition: color 0.2s; letter-spacing: 0.02em;
}
.back-link:hover { color: rgba(255,255,255,0.8); }
.back-link svg { width: 16px; height: 16px; }

/* ── Card ── */
.login-card {
  position: relative; z-index: 10;
  width: 100%; max-width: 420px;
  margin: 0 clamp(1rem, 5vw, 2rem);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 28px;
  padding: clamp(2rem, 5vw, 3rem);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
}
html:not(.dark) .login-card {
  background: rgba(253,250,247,0.88);
  border-color: rgba(120,70,90,0.10);
}
html:not(.dark) body { background: #fdf0e8; }

/* ── Logo area ── */
.card-logo {
  display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;
}
.card-logo img { height: 36px; width: 36px; }
.card-logo-name {
  font-family: 'Crimson Text', serif; font-size: 1.25rem; font-weight: 700;
  background: var(--grad-h);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* ── Heading ── */
.card-heading {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.75rem, 4vw, 2.25rem);
  font-weight: 400; line-height: 1.2;
  background: var(--grad-h);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 0.375rem;
}
.card-sub {
  font-size: 0.875rem; color: rgba(255,255,255,0.38); margin-bottom: 2rem; font-weight: 400;
}
html:not(.dark) .card-sub { color: var(--fg3); }

/* ── Fields ── */
.field { margin-bottom: 1.5rem; }
.field-label {
  display: block; font-size: 0.625rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.35); margin-bottom: 0.625rem;
}
html:not(.dark) .field-label { color: var(--fg3); }
.field-row {
  display: flex; align-items: center; gap: 0.625rem;
  border-bottom: 1.5px solid rgba(255,255,255,0.12); padding-bottom: 0.625rem;
  transition: border-color 0.25s;
}
html:not(.dark) .field-row { border-bottom-color: var(--border); }
.field-row:focus-within { border-color: var(--c4); }
.field-row svg { width: 15px; height: 15px; color: rgba(255,255,255,0.25); flex-shrink: 0; transition: color 0.2s; }
html:not(.dark) .field-row svg { color: var(--fg3); }
.field-row:focus-within svg { color: var(--c4); }
.field-row input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--ff-b); font-size: 0.9375rem;
  color: rgba(255,255,255,0.88);
}
html:not(.dark) .field-row input { color: var(--fg); }
.field-row input::placeholder { color: rgba(255,255,255,0.2); }
html:not(.dark) .field-row input::placeholder { color: var(--fg3); }

.field-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.625rem; }
.forgot {
  font-size: 0.625rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.2s;
}
html:not(.dark) .forgot { color: var(--fg3); }
.forgot:hover { color: var(--c2); }

/* ── Name field (register only) ── */
.name-field { overflow: hidden; max-height: 0; transition: max-height 0.35s ease; }
.name-field.open { max-height: 80px; }

/* ── Submit ── */
.submit-btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.625rem;
  background: var(--grad); color: #fff;
  font-family: var(--ff-b); font-size: 0.9375rem; font-weight: 700;
  padding: 0.9em 2em; border-radius: var(--r-full); border: none; cursor: pointer;
  margin-top: 0.5rem;
  box-shadow: 0 4px 24px rgba(213,51,42,0.25);
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
}
.submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(213,51,42,0.38); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.submit-btn svg { width: 16px; height: 16px; }

/* ── Toggle ── */
.toggle-area {
  margin-top: 1.75rem; padding-top: 1.5rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
html:not(.dark) .toggle-area { border-top-color: var(--border); }
.toggle-area p { font-size: 0.8125rem; color: rgba(255,255,255,0.35); }
html:not(.dark) .toggle-area p { color: var(--fg3); }
.toggle-btn {
  font-size: 0.8125rem; color: rgba(255,255,255,0.7); font-family: var(--ff-b);
  background: none; border: none; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px; transition: color 0.2s;
}
html:not(.dark) .toggle-btn { color: var(--fg2); }
.toggle-btn:hover { color: var(--c2); }

/* ── Copyright ── */
.card-copy {
  text-align: center; margin-top: 1.5rem;
  font-size: 0.5625rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.18);
}
html:not(.dark) .card-copy { color: var(--fg3); }
</style>
</head>
<body>

<!-- Floating orbs -->
<div class="orb" style="width:500px;height:500px;top:-10%;left:-15%;background:#f17628;animation-delay:0s"></div>
<div class="orb" style="width:560px;height:560px;bottom:-20%;right:-12%;background:#a21f65;animation-delay:-4s"></div>
<div class="orb" style="width:320px;height:320px;top:35%;right:10%;background:#d5332a;animation-delay:-2s;opacity:.09"></div>

<!-- Top bar -->
<div class="top-bar">
  <a href="Landing Page.html" class="back-link">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Ana Sayfa
  </a>
  <button class="theme-btn" id="themeBtn" aria-label="Tema değiştir">
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<!-- Login card -->
<div class="login-card" style="font-family: &quot;Crimson Text&quot;">

  <!-- Logo -->
  <div class="card-logo">
    <img src="assets/logo.svg" alt="CrowGuard">
    <span class="card-logo-name">CrowGuard</span>
  </div>

  <!-- Heading -->
  <h2 class="card-heading" id="authHeading" style="font-family: &quot;Playfair Display&quot;">Tekrar Hoşgeldiniz</h2>
  <p class="card-sub" id="authSub" style="font-family: &quot;DM Sans&quot;">Alışveriş asistanınız sizi bekliyor.</p>

  <form id="authForm" onsubmit="handleSubmit(event)">

    <!-- Name (register only) -->
    <div class="field name-field" id="nameField">
      <label class="field-label">Ad Soyad</label>
      <div class="field-row">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <input type="text" placeholder="Adınız Soyadınız">
      </div>
    </div>

    <!-- Email -->
    <div class="field">
      <label class="field-label" style="font-family: &quot;DM Sans&quot;">E-Posta</label>
      <div class="field-row">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <input type="email" placeholder="isim@sirket.com" required>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <div class="field-meta" style="font-family: &quot;DM Sans&quot;">
        <label class="field-label" style="margin-bottom:0">Şifre</label>
        <a href="#" class="forgot" id="forgotLink">Unuttum</a>
      </div>
      <div class="field-row">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" placeholder="••••••••" required>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14"/></svg>
      <span id="submitLabel" style="font-family: &quot;DM Sans&quot;">Giriş Yap</span>
    </button>
  </form>

  <div class="toggle-area">
    <p id="togglePrompt" style="font-family: &quot;DM Sans&quot;">Hesabınız yok mu?</p>
    <button class="toggle-btn" onclick="toggleMode()" id="toggleBtn" style="font-family: &quot;DM Sans&quot;">Ücretsiz kaydolun</button>
  </div>

  <p class="card-copy" style="font-family: &quot;DM Sans&quot;">© 2026 CrowGuard AI</p>
</div>

<script>
let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;
  document.getElementById('authHeading').textContent = isLogin ? 'Tekrar Hoşgeldiniz' : 'Hesap Oluşturun';
  document.getElementById('authSub').textContent = isLogin ? 'Alışveriş asistanınız sizi bekliyor.' : 'Akıllı alışverişe ilk adımı atın.';
  document.getElementById('submitLabel').textContent = isLogin ? 'Giriş Yap' : 'Kayıt Ol';
  document.getElementById('togglePrompt').textContent = isLogin ? 'Hesabınız yok mu?' : 'Zaten hesabınız var mı?';
  document.getElementById('toggleBtn').textContent = isLogin ? 'Ücretsiz kaydolun' : 'Giriş yapın';
  document.getElementById('forgotLink').style.display = isLogin ? '' : 'none';
  document.getElementById('nameField').classList.toggle('open', !isLogin);
}

function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.style.opacity = '0.7';
  setTimeout(() => { window.location.href = 'Dashboard.html'; }, 800);
}

if (localStorage.getItem('cg-theme') === 'light') document.documentElement.classList.remove('dark');
document.getElementById('themeBtn').addEventListener('click', () => {
  const d = document.documentElement.classList.toggle('dark');
  localStorage.setItem('cg-theme', d ? 'dark' : 'light');
});
</script>
</body>
</html>
